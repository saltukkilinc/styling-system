<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Styling System</title>

    <link rel="stylesheet" href="/src/css/main.css" />
  </head>
  <body>
    <main>
      <section>
        <div class="container">
          <h2 class="mb-7 text-center">Buttons</h2>

          <h3 class="mb-6">Primary Buttons</h3>

          <div class="mb-6 flex items-center gap-3">
            <button class="button button-primary button-small">
              Small Primary
            </button>
            <button class="button button-primary">Primary</button>
            <button class="button button-primary button-large">
              Large Primary
            </button>
            <button class="button button-primary button-large" disabled>
              Disabled Large Primary
            </button>
          </div>

          <h3 class="mb-6">Secondary Buttons</h3>
          
          <div class="mb-6 flex items-center gap-3">
            <button class="button button-secondary button-small">
              Small Secondary
            </button>
            <button class="button button-secondary">Secondary</button>
            <button class="button button-secondary button-large">
              Large Secondary
            </button>
            <button class="button button-secondary button-large" disabled>
              Disabled Large Secondary
            </button>
          </div>

          <h3 class="mb-6">Outlined Buttons</h3>

          <div class="flex items-center gap-3">
            <button class="button button-outline button-small">
              Small Outline
            </button>
            <button class="button button-outline">Outline</button>
            <button class="button button-outline button-large">
              Large Outline
            </button>
            <button class="button button-outline button-large" disabled>
              Disabled Large Outline
            </button>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
